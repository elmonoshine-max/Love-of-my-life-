<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Galaxia del Amor 💕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:#000005;
  display:flex;align-items:center;justify-content:center;
  font-family:'Segoe UI',sans-serif;
}
#galaxy{
  width:100vw;height:100vh;
  position:relative;overflow:hidden;
}
canvas#stars{position:absolute;inset:0;width:100%;height:100%;}

.nebula{
  position:absolute;border-radius:50%;
  animation:nebulapulse 6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes nebulapulse{0%,100%{opacity:.18;}50%{opacity:.32;}}

.orbit-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(255,255,255,.07);
  pointer-events:none;
}

.phrase{
  position:absolute;
  color:#fff;font-size:12px;font-weight:500;
  white-space:nowrap;
  text-shadow:0 0 14px rgba(255,180,255,.9),0 0 4px #fff;
  animation:orbitphrase linear infinite;
  transform-origin:0 0;
  letter-spacing:.5px;
}
@keyframes orbitphrase{
  from{transform:rotate(var(--a0)) translateX(var(--r)) rotate(calc(-1*var(--a0)));}
  to{transform:rotate(calc(var(--a0)+360deg)) translateX(var(--r)) rotate(calc(-1*(var(--a0)+360deg)));}
}

.char{
  position:absolute;
  animation:orbitchar linear infinite, charfloat ease-in-out infinite;
  transform-origin:0 0;
  font-size:38px;
  cursor:default;
  filter:drop-shadow(0 0 10px rgba(255,200,255,.7));
}
@keyframes orbitchar{
  from{transform:rotate(var(--a0)) translateX(var(--r)) rotate(calc(-1*var(--a0)));}
  to{transform:rotate(calc(var(--a0)+360deg)) translateX(var(--r)) rotate(calc(-1*(var(--a0)+360deg)));}
}
@keyframes charfloat{
  0%,100%{margin-top:-19px;}
  50%{margin-top:-28px;}
}

.heart-center{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  font-size:110px;
  animation:heartbeat 1.3s ease-in-out infinite;
  filter:drop-shadow(0 0 40px #ff1493) drop-shadow(0 0 80px #ff69b4);
  z-index:20;
  line-height:1;
}
@keyframes heartbeat{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  25%{transform:translate(-50%,-50%) scale(1.2);}
  50%{transform:translate(-50%,-50%) scale(1.08);}
}

.sparkle-dot{
  position:absolute;border-radius:50%;
  animation:twinkle ease-in-out infinite;
  pointer-events:none;
}
@keyframes twinkle{
  0%,100%{opacity:0;transform:scale(.4);}
  50%{opacity:1;transform:scale(1.3);}
}

.shooting-star{
  position:absolute;height:2px;border-radius:2px;
  animation:shoot linear infinite;
  pointer-events:none;
}
@keyframes shoot{
  0%{opacity:0;transform:translateX(0);}
  10%{opacity:1;}
  100%{opacity:0;transform:translateX(-400px);}
}

.bg-grad{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center,#1a0040 0%,#0a001a 55%,#000005 100%);
  pointer-events:none;
}
</style>
</head>
<body>
<div id="galaxy">
  <div class="bg-grad"></div>
  <canvas id="stars"></canvas>

  <div class="nebula" style="width:380px;height:260px;left:5%;top:3%;background:radial-gradient(ellipse,rgba(120,0,200,.35),transparent);"></div>
  <div class="nebula" style="width:320px;height:240px;right:4%;top:25%;background:radial-gradient(ellipse,rgba(200,0,100,.3),transparent);animation-delay:-3s"></div>
  <div class="nebula" style="width:280px;height:260px;left:28%;bottom:3%;background:radial-gradient(ellipse,rgba(0,80,200,.25),transparent);animation-delay:-1.5s"></div>

  <div class="orbit-ring" id="ring1"></div>
  <div class="orbit-ring" id="ring2"></div>
  <div class="orbit-ring" id="ring3"></div>

  <div class="heart-center">❤️</div>
</div>

<script>
const galaxy=document.getElementById('galaxy');
const cv=document.getElementById('stars');
const ctx=cv.getContext('2d');

function setup(){
  const W=window.innerWidth,H=window.innerHeight;
  cv.width=W;cv.height=H;
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<280;i++){
    const x=Math.random()*W,y=Math.random()*H,r=Math.random()*1.6+.2;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    const b=Math.floor(160+Math.random()*95);
    ctx.fillStyle=`rgb(${b},${b-15},${Math.min(255,b+40)})`;
    ctx.fill();
  }
}
setup();
window.addEventListener('resize',setup);

function place(){
  const W=window.innerWidth,H=window.innerHeight;
  const cx=W/2,cy=H/2;
  const scale=Math.min(W,H)/680;

  ['ring1','ring2','ring3'].forEach((id,i)=>{
    const size=[200,310,430].map(s=>s*scale)[i];
    const el=document.getElementById(id);
    el.style.cssText=`width:${size}px;height:${size}px;left:${cx-size/2}px;top:${cy-size/2}px;`;
  });

  document.querySelectorAll('.sparkle-dot').forEach(e=>e.remove());
  for(let i=0;i<35;i++){
    const d=document.createElement('div');
    d.className='sparkle-dot';
    const s=Math.random()*4+1;
    const hue=Math.random()*80+270;
    d.style.cssText=`
      width:${s}px;height:${s}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      background:hsl(${hue},100%,85%);
      animation-duration:${1.5+Math.random()*3}s;
      animation-delay:${Math.random()*3}s;
    `;
    galaxy.appendChild(d);
  }

  document.querySelectorAll('.shooting-star').forEach(e=>e.remove());
  for(let i=0;i<6;i++){
    const s=document.createElement('div');
    s.className='shooting-star';
    const len=80+Math.random()*120;
    s.style.cssText=`
      width:${len}px;
      left:${50+Math.random()*50}%;top:${Math.random()*45}%;
      background:linear-gradient(to left,rgba(255,255,255,0),rgba(255,255,255,.95));
      animation-duration:${3+Math.random()*5}s;
      animation-delay:${Math.random()*7}s;
    `;
    galaxy.appendChild(s);
  }

  document.querySelectorAll('.phrase').forEach(e=>e.remove());
  const phrases=[
    {t:"Te amo con todo mi corazón",r:155,speed:28,a0:10},
    {t:"Eres mi universo entero",r:155,speed:28,a0:130},
    {t:"Contigo todo es mejor",r:155,speed:28,a0:250},
    {t:"Mi persona favorita",r:215,speed:38,a0:40},
    {t:"Juntos para siempre",r:215,speed:38,a0:160},
    {t:"Eres mi mayor tesoro",r:215,speed:38,a0:280},
    {t:"Locamente enamorado de ti",r:215,speed:38,a0:320},
  ];
  phrases.forEach(p=>{
    const el=document.createElement('div');
    el.className='phrase';
    el.textContent=p.t;
    el.style.cssText=`
      left:${cx}px;top:${cy}px;
      --a0:${p.a0}deg;
      --r:${p.r*scale}px;
      animation-duration:${p.speed}s;
      animation-delay:-${Math.random()*p.speed}s;
      font-size:${Math.max(10,12*scale)}px;
    `;
    galaxy.appendChild(el);
  });

  document.querySelectorAll('.char').forEach(e=>e.remove());
  const chars=[
    {e:'🕷️',label:'Spiderman',r:105,speed:18,a0:0},
    {e:'🐱',label:'Hello Kitty',r:105,speed:18,a0:72},
    {e:'🐻',label:'Osito',r:105,speed:18,a0:144},
    {e:'🦄',label:'Unicornio',r:105,speed:18,a0:216},
    {e:'🐼',label:'Panda',r:105,speed:18,a0:288},
  ];
  chars.forEach(c=>{
    const el=document.createElement('div');
    el.className='char';
    el.textContent=c.e;
    el.title=c.label;
    const fs=Math.max(24,38*scale);
    el.style.cssText=`
      left:${cx}px;top:${cy}px;
      --a0:${c.a0}deg;
      --r:${c.r*scale}px;
      animation-duration:${c.speed}s,3s;
      animation-delay:-${Math.random()*c.speed}s,-${Math.random()*3}s;
      font-size:${fs}px;
      margin-left:${-fs/2}px;
      margin-top:${-fs/2}px;
    `;
    galaxy.appendChild(el);
  });
}

place();
window.addEventListener('resize',()=>{setup();place();});
</script>
</body>
</html>
